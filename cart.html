<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - iTSEC.AZ</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom border-warning shadow-sm sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="index.html">
                <span class="text-danger">i</span><span class="text-warning">TSEC</span><span class="text-danger">.AZ</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h1 class="mb-4">
            <i class="fas fa-shopping-cart text-danger"></i> Shopping Cart
        </h1>

        <div class="row">
            <!-- Cart Items -->
            <div class="col-lg-8">
                <div class="card border-danger mb-4">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0">Cart Items (<span id="cartCount">0</span>)</h5>
                    </div>
                    <div class="card-body" id="cartItemsContainer">
                        <p class="text-muted text-center py-5">Your cart is empty</p>
                    </div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="col-lg-4">
                <div class="card border-warning mb-4 sticky-top" style="top: 80px;">
                    <div class="card-header bg-warning text-dark fw-bold">
                        Order Summary
                    </div>
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-2">
                            <span>Subtotal:</span>
                            <span id="subtotal">$0.00</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Shipping:</span>
                            <span class="text-success">Free</span>
                        </div>
                        <hr class="border-warning">
                        <div class="d-flex justify-content-between h5 mb-4">
                            <strong>Total:</strong>
                            <strong class="text-danger" id="totalPrice">$0.00</strong>
                        </div>

                        <button class="btn btn-danger btn-lg w-100 mb-2" onclick="proceedToCheckout()" id="checkoutBtn">
                            <i class="fab fa-whatsapp"></i> Order via WhatsApp
                        </button>
                        <a href="products.html" class="btn btn-outline-danger btn-lg w-100">
                            <i class="fas fa-arrow-left"></i> Continue Shopping
                        </a>
                    </div>
                </div>

                <!-- User Info for Order -->
                <div class="card bg-light">
                    <div class="card-body">
                        <h6 class="card-title">Order Information</h6>
                        <div class="mb-3">
                            <label class="form-label small">Name</label>
                            <input type="text" class="form-control form-control-sm" id="orderName" placeholder="Your name">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Phone</label>
                            <input type="tel" class="form-control form-control-sm" id="orderPhone" placeholder="Your phone number">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Address</label>
                            <textarea class="form-control form-control-sm" id="orderAddress" rows="3" placeholder="Delivery address"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container">
            <p class="text-center small mb-0">&copy; 2024 iTSEC.AZ & ProSecurity. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        let userRole = localStorage.getItem('userRole') || 'customer';

        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const container = document.getElementById('cartItemsContainer');

            if (cart.length === 0) {
                container.innerHTML = '<p class="text-muted text-center py-5">Your cart is empty</p>';
                document.getElementById('checkoutBtn').disabled = true;
                return;
            }

            let html = '';
            cart.forEach((item, index) => {
                html += `
                    <div class="row border-bottom pb-3 mb-3">
                        <div class="col-3">
                            <img src="${item.image}" class="img-fluid rounded" alt="${item.name}">
                        </div>
                        <div class="col-5">
                            <h6>${item.name}</h6>
                            <p class="text-danger fw-bold">$${item.price.toFixed(2)}</p>
                        </div>
                        <div class="col-4">
                            <div class="input-group input-group-sm mb-2">
                                <button class="btn btn-outline-danger" onclick="updateQuantity(${index}, -1)">-</button>
                                <input type="number" class="form-control text-center" value="${item.quantity}" disabled>
                                <button class="btn btn-outline-danger" onclick="updateQuantity(${index}, 1)">+</button>
                            </div>
                            <button class="btn btn-sm btn-outline-danger w-100" onclick="removeFromCart(${index})">
                                <i class="fas fa-trash"></i> Remove
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            document.getElementById('cartCount').textContent = cart.length;
            calculateTotal();
        }

        function updateQuantity(index, change) {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart[index].quantity += change;
            if (cart[index].quantity < 1) cart[index].quantity = 1;
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
        }

        function removeFromCart(index) {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
        }

        function calculateTotal() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('subtotal').textContent = '$' + total.toFixed(2);
            document.getElementById('totalPrice').textContent = '$' + total.toFixed(2);
        }

        function proceedToCheckout() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }

            const name = document.getElementById('orderName').value;
            const phone = document.getElementById('orderPhone').value;
            const address = document.getElementById('orderAddress').value;

            if (!name || !phone || !address) {
                alert('Please fill in all order information!');
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            let message = '📦 *NEW ORDER FROM iTSEC.AZ*\n\n';
            message += '👤 *Customer Information*\n';
            message += `Name: ${name}\n`;
            message += `Phone: ${phone}\n`;
            message += `Address: ${address}\n\n`;
            message += '📋 *Order Items*\n';
            
            cart.forEach(item => {
                message += `• ${item.name}\n`;
                message += `  Qty: ${item.quantity} × $${item.price.toFixed(2)} = $${(item.price * item.quantity).toFixed(2)}\n`;
            });

            message += `\n💰 *Total: $${total.toFixed(2)}*\n\n`;
            message += 'Always by your side for your security ✨\niTSEC.AZ & ProSecurity';

            const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');

            // Save order to localStorage
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders.push({
                id: Date.now(),
                date: new Date().toLocaleString(),
                items: cart,
                customer: { name, phone, address },
                total: total,
                status: 'Pending'
            });
            localStorage.setItem('orders', JSON.stringify(orders));

            // Clear cart
            localStorage.removeItem('cart');
            loadCart();
            alert('Order sent! Check your WhatsApp for confirmation.');
        }

        document.addEventListener('DOMContentLoaded', loadCart);
    </script>
</body>
</html>
