<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - iTSEC.AZ | Our Projects</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom border-warning shadow-sm sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="index.html">
                <span class="text-danger">i</span><span class="text-warning">TSEC</span><span class="text-danger">.AZ</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link active" href="portfolio.html">Portfolio</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold">
                <span class="text-danger">Our</span> <span class="text-warning">Portfolio</span>
            </h1>
            <p class="lead text-muted">Professional security system installations and projects</p>
        </div>

        <!-- Gallery Tabs -->
        <ul class="nav nav-tabs justify-content-center mb-4" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="images-tab" data-bs-toggle="tab" data-bs-target="#images" type="button" role="tab">
                    <i class="fas fa-images"></i> Images
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="videos-tab" data-bs-toggle="tab" data-bs-target="#videos" type="button" role="tab">
                    <i class="fas fa-video"></i> Videos
                </button>
            </li>
        </ul>

        <!-- Gallery Content -->
        <div class="tab-content">
            <!-- Images Tab -->
            <div class="tab-pane fade show active" id="images" role="tabpanel">
                <div class="row g-4" id="portfolioImages">
                    <!-- Portfolio images will load here -->
                </div>
                <div class="text-center mt-4" id="noImages" style="display:none;">
                    <p class="text-muted">No images yet. Check back soon!</p>
                </div>
            </div>

            <!-- Videos Tab -->
            <div class="tab-pane fade" id="videos" role="tabpanel">
                <div class="row g-4" id="portfolioVideos">
                    <!-- Portfolio videos will load here -->
                </div>
                <div class="text-center mt-4" id="noVideos" style="display:none;">
                    <p class="text-muted">No videos yet. Check back soon!</p>
                </div>
            </div>
        </div>

        <!-- Admin Upload Section (Only visible to admins) -->
        <div class="card bg-light mt-5" id="adminSection" style="display:none;">
            <div class="card-header bg-danger text-white">
                <h6 class="mb-0"><i class="fas fa-upload"></i> Portfolio Management (Admin Only)</h6>
            </div>
            <div class="card-body">
                <ul class="nav nav-tabs mb-3" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" id="upload-img-tab" data-bs-toggle="tab" data-bs-target="#upload-img" type="button" role="tab">
                            <i class="fas fa-cloud-upload-alt"></i> Upload Image
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="upload-vid-tab" data-bs-toggle="tab" data-bs-target="#upload-vid" type="button" role="tab">
                            <i class="fas fa-cloud-upload-alt"></i> Upload Video
                        </button>
                    </li>
                </ul>

                <div class="tab-content">
                    <!-- Upload Image -->
                    <div class="tab-pane fade show active" id="upload-img" role="tabpanel">
                        <div class="mb-3">
                            <label class="form-label">Image Title</label>
                            <input type="text" class="form-control" id="imgTitle" placeholder="Project name...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Image Description</label>
                            <textarea class="form-control" id="imgDesc" rows="3" placeholder="Project description..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Image File</label>
                            <input type="file" class="form-control" id="imgFile" accept="image/*">
                        </div>
                        <button class="btn btn-danger" onclick="uploadPortfolioImage()">
                            <i class="fas fa-upload"></i> Upload Image
                        </button>
                    </div>

                    <!-- Upload Video -->
                    <div class="tab-pane fade" id="upload-vid" role="tabpanel">
                        <div class="mb-3">
                            <label class="form-label">Video Title</label>
                            <input type="text" class="form-control" id="vidTitle" placeholder="Project name...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Video Description</label>
                            <textarea class="form-control" id="vidDesc" rows="3" placeholder="Project description..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Video URL (YouTube, Vimeo, etc.)</label>
                            <input type="url" class="form-control" id="vidUrl" placeholder="https://youtube.com/embed/...">
                        </div>
                        <button class="btn btn-danger" onclick="uploadPortfolioVideo()">
                            <i class="fas fa-upload"></i> Upload Video
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div class="modal fade" id="imageModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Project</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <img id="modalImage" src="" alt="Project" class="img-fluid w-100">
                    <p id="modalDesc" class="mt-3 text-muted"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container">
            <p class="text-center small mb-0">&copy; 2024 iTSEC.AZ & ProSecurity. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        let userRole = localStorage.getItem('userRole') || 'guest';

        function loadPortfolio() {
            const portfolio = JSON.parse(localStorage.getItem('portfolio')) || [];
            
            // Load Images
            const images = portfolio.filter(item => item.type === 'image');
            const imagesContainer = document.getElementById('portfolioImages');
            const noImages = document.getElementById('noImages');
            
            if (images.length === 0) {
                imagesContainer.innerHTML = '';
                noImages.style.display = 'block';
            } else {
                noImages.style.display = 'none';
                imagesContainer.innerHTML = images.map((item, idx) => `
                    <div class="col-md-6 col-lg-4">
                        <div class="portfolio-card position-relative overflow-hidden rounded">
                            <img src="${item.url}" alt="${item.title}" class="img-fluid w-100" style="height: 250px; object-fit: cover;">
                            <div class="portfolio-overlay">
                                <h6>${item.title}</h6>
                                <button class="btn btn-sm btn-light" onclick="viewImage('${item.url}', '${item.title}', '${item.description}')">
                                    <i class="fas fa-eye"></i> View
                                </button>
                                ${userRole === 'admin' ? `<button class="btn btn-sm btn-danger ms-2" onclick="deletePortfolioItem(${idx}, 'image')"><i class="fas fa-trash"></i></button>` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // Load Videos
            const videos = portfolio.filter(item => item.type === 'video');
            const videosContainer = document.getElementById('portfolioVideos');
            const noVideos = document.getElementById('noVideos');
            
            if (videos.length === 0) {
                videosContainer.innerHTML = '';
                noVideos.style.display = 'block';
            } else {
                noVideos.style.display = 'none';
                videosContainer.innerHTML = videos.map((item, idx) => `
                    <div class="col-md-6 col-lg-4">
                        <div class="portfolio-card position-relative overflow-hidden rounded">
                            <iframe width="100%" height="250" src="${item.url}" style="border:none;" allowfullscreen="" loading="lazy"></iframe>
                            <div class="portfolio-overlay">
                                <h6>${item.title}</h6>
                                <p class="small text-white">${item.description}</p>
                                ${userRole === 'admin' ? `<button class="btn btn-sm btn-danger" onclick="deletePortfolioItem(${idx}, 'video')"><i class="fas fa-trash"></i></button>` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // Show admin section only if logged in as admin
            if (userRole === 'admin') {
                document.getElementById('adminSection').style.display = 'block';
            }
        }

        function viewImage(url, title, description) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalImage').src = url;
            document.getElementById('modalDesc').textContent = description;
            new bootstrap.Modal(document.getElementById('imageModal')).show();
        }

        function uploadPortfolioImage() {
            const title = document.getElementById('imgTitle').value;
            const description = document.getElementById('imgDesc').value;
            const fileInput = document.getElementById('imgFile');
            
            if (!title || !fileInput.files[0]) {
                alert('Please fill in title and select an image');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const portfolio = JSON.parse(localStorage.getItem('portfolio')) || [];
                portfolio.push({
                    type: 'image',
                    title: title,
                    description: description,
                    url: e.target.result,
                    uploadedAt: new Date().toLocaleString()
                });
                localStorage.setItem('portfolio', JSON.stringify(portfolio));
                
                // Clear form
                document.getElementById('imgTitle').value = '';
                document.getElementById('imgDesc').value = '';
                document.getElementById('imgFile').value = '';
                
                alert('Image uploaded successfully!');
                loadPortfolio();
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        function uploadPortfolioVideo() {
            const title = document.getElementById('vidTitle').value;
            const description = document.getElementById('vidDesc').value;
            const url = document.getElementById('vidUrl').value;
            
            if (!title || !url) {
                alert('Please fill in all fields');
                return;
            }

            const portfolio = JSON.parse(localStorage.getItem('portfolio')) || [];
            portfolio.push({
                type: 'video',
                title: title,
                description: description,
                url: url,
                uploadedAt: new Date().toLocaleString()
            });
            localStorage.setItem('portfolio', JSON.stringify(portfolio));
            
            // Clear form
            document.getElementById('vidTitle').value = '';
            document.getElementById('vidDesc').value = '';
            document.getElementById('vidUrl').value = '';
            
            alert('Video added successfully!');
            loadPortfolio();
        }

        function deletePortfolioItem(index, type) {
            if (confirm('Are you sure you want to delete this item?')) {
                const portfolio = JSON.parse(localStorage.getItem('portfolio')) || [];
                const filtered = portfolio.filter((item, idx) => {
                    if (item.type === type) {
                        let typeIndex = portfolio.filter(p => p.type === type).indexOf(item);
                        return typeIndex !== index;
                    }
                    return true;
                });
                localStorage.setItem('portfolio', JSON.stringify(filtered));
                loadPortfolio();
            }
        }

        document.addEventListener('DOMContentLoaded', loadPortfolio);
    </script>
</body>
</html>
