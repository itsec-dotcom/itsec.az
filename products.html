<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - iTSEC.AZ | Professional Security Equipment</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom border-warning shadow-sm sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="index.html">
                <span class="text-danger">i</span><span class="text-warning">TSEC</span><span class="text-danger">.AZ</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="portfolio.html">Portfolio</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userMenu" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user"></i> Account
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="userMenu">
                            <li><a class="dropdown-item" href="login.html">Login</a></li>
                            <li><a class="dropdown-item" href="register.html">Register</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <div class="row">
            <!-- Filters Sidebar -->
            <div class="col-lg-3">
                <div class="card border-danger mb-4">
                    <div class="card-header bg-danger text-white">
                        <h6 class="mb-0"><i class="fas fa-filter"></i> Filters</h6>
                    </div>
                    <div class="card-body">
                        <!-- Search -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Search Products</label>
                            <input type="text" class="form-control" id="searchInput" placeholder="Search...">
                        </div>

                        <!-- Brand Filter -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Brand</label>
                            <div class="form-check">
                                <input class="form-check-input brand-filter" type="checkbox" value="Hikvision" id="brand1">
                                <label class="form-check-label" for="brand1">Hikvision</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input brand-filter" type="checkbox" value="Avitel" id="brand2">
                                <label class="form-check-label" for="brand2">Avitel</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input brand-filter" type="checkbox" value="Dahua" id="brand3">
                                <label class="form-check-label" for="brand3">Dahua</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input brand-filter" type="checkbox" value="TP-Link" id="brand4">
                                <label class="form-check-label" for="brand4">TP-Link</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input brand-filter" type="checkbox" value="Uniview" id="brand5">
                                <label class="form-check-label" for="brand5">Uniview</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input brand-filter" type="checkbox" value="TVT" id="brand6">
                                <label class="form-check-label" for="brand6">TVT</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input brand-filter" type="checkbox" value="Tiandy" id="brand7">
                                <label class="form-check-label" for="brand7">Tiandy</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input brand-filter" type="checkbox" value="Ubiquiti" id="brand8">
                                <label class="form-check-label" for="brand8">Ubiquiti</label>
                            </div>
                        </div>

                        <!-- Category Filter -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Category</label>
                            <div class="form-check">
                                <input class="form-check-input category-filter" type="checkbox" value="cameras" id="cat1">
                                <label class="form-check-label" for="cat1">IP PTZ Cameras</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input category-filter" type="checkbox" value="cables" id="cat2">
                                <label class="form-check-label" for="cat2">Cat 6 Cables</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input category-filter" type="checkbox" value="intercom" id="cat3">
                                <label class="form-check-label" for="cat3">Intercom Systems</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input category-filter" type="checkbox" value="barriers" id="cat4">
                                <label class="form-check-label" for="cat4">Barrier Gates</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input category-filter" type="checkbox" value="keys" id="cat5">
                                <label class="form-check-label" for="cat5">Key Systems</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input category-filter" type="checkbox" value="smart" id="cat6">
                                <label class="form-check-label" for="cat6">Smart Systems</label>
                            </div>
                        </div>

                        <button class="btn btn-danger w-100" onclick="clearFilters()">Clear Filters</button>
                    </div>
                </div>
            </div>

            <!-- Products Grid -->
            <div class="col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>All Products</h2>
                    <select class="form-select" style="max-width: 200px;" id="sortSelect">
                        <option value="name-asc">Sort by Name (A-Z)</option>
                        <option value="price-asc">Price: Low to High</option>
                        <option value="price-desc">Price: High to Low</option>
                    </select>
                </div>

                <div class="row g-4" id="productsGrid">
                    <!-- Products will be loaded here by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container">
            <p class="text-center small mb-0">&copy; 2024 iTSEC.AZ & ProSecurity. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
